<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaval.AI Python Playground (Pyodide)</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v314.0.0/full/pyodide.js"></script>
    <!-- CodeMirror for Python syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            background: #181825;
            border-bottom: 1px solid #313244;
            flex-wrap: wrap;
        }
        header h1 { font-size: 1rem; margin: 0; font-weight: 600; }
        header .status { font-size: 0.8rem; color: #a6adc8; margin-left: auto; }
        #packages, #wheel {
            background: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid #313244;
            border-radius: 6px;
            padding: 0.4rem 0.6rem;
            font-size: 0.8rem;
            min-width: 240px;
        }
        #wheel { min-width: 320px; }
        button {
            background: #89b4fa;
            color: #1e1e2e;
            border: none;
            border-radius: 6px;
            padding: 0.4rem 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button:not(:disabled):hover { background: #74c7ec; }
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: #313244;
            min-height: 0;
        }
        .panel { display: flex; flex-direction: column; background: #1e1e2e; min-height: 0; }
        .panel-label {
            padding: 0.4rem 0.75rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a6adc8;
            background: #181825;
        }
        .CodeMirror {
            flex: 1;
            height: auto;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        #output {
            flex: 1;
            margin: 0;
            overflow: auto;
            padding: 0.75rem;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .stderr { color: #f38ba8; }
        .meta { color: #a6adc8; font-style: italic; }
    </style>
</head>
<body>
<header>
    <h1>🐍 Kaval.AI Playground</h1>
    <input id="wheel" type="text" value="dist/kavalai-1.0.0-py3-none-any.whl"
           title="URL or relative path to the kavalai wheel (built with: uv build --wheel)">
    <input id="packages" type="text" placeholder="extra packages (e.g. plotly)" disabled>
    <button id="run" disabled>Run ▶</button>
    <span class="status" id="status">Loading Pyodide…</span>
</header>
<main>
    <section class="panel">
        <div class="panel-label">Code — press Ctrl+Enter to run</div>
        <textarea id="code"></textarea>
    </section>
    <section class="panel">
        <div class="panel-label">Output (stdout / stderr)</div>
        <pre id="output"></pre>
    </section>
</main>

<script>
    const outputEl = document.getElementById("output");
    const runBtn = document.getElementById("run");
    const statusEl = document.getElementById("status");
    const packagesEl = document.getElementById("packages");
    const wheelEl = document.getElementById("wheel");

    const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
        mode: "python",
        theme: "dracula",
        lineNumbers: true,
        indentUnit: 4,
        extraKeys: { "Ctrl-Enter": run, "Cmd-Enter": run },
    });
    editor.setValue(
`import kavalai
from kavalai import evaluate_expression, evaluate_bool, FunctionKernel, pythontool
from kavalai.agents.db import db_manager, Agent
from sqlalchemy import select

print("Loaded the Kaval.AI core in the browser 🎉")

# --- 1) Core expression engine (pure Python, pyodide-friendly) ---
ctx = {"user": {"name": "Ada", "age": 36}}
print("name     =", evaluate_expression("user.name", ctx))
print("is_adult =", evaluate_bool("user.age >= 18", ctx))

# --- 2) Register a Python tool and call it through the FunctionKernel ---
@pythontool
def add(a: int, b: int) -> int:
    return a + b

kernel = FunctionKernel()
kernel.register_python_tool("add", add)

# Pyodide supports top-level await, so we can await the async kernel directly.
print("add(2, 40) =", await kernel.call_tool("python://add", {"a": 2, "b": 40}))

# --- 3) Persistent database backed by the browser's IndexedDB ---
# init_sqlite_sync() mounts IndexedDB, creates the tables and persists the file.
# We use the *sync* SQLite engine: SQLAlchemy's async engine needs greenlet (no
# pyodide build) plus aiosqlite's worker thread, neither of which works in the
# browser. The sync engine uses plain sqlite3 on the main thread instead; only
# the IndexedDB mount/flush are awaited. The SQLite file lives on Emscripten's
# IDBFS, so it survives reloads.
await db_manager.init_sqlite_sync()
sm = db_manager.get_sqlite_sync_sessionmaker()

with sm() as session:
    stored = session.execute(select(Agent)).scalars().all()
    print(f"agents already in IndexedDB: {len(stored)}")
    session.add(Agent(name=f"agent-{len(stored) + 1}"))
    session.commit()

# Persist the change so it survives a page reload.
await db_manager.flush()

with sm() as session:
    names = [a.name for a in session.execute(select(Agent)).scalars()]
print("agents now stored:", names)
print("Re-run / reload the page — the list keeps growing (persisted in IndexedDB).")
`
    );

    let pyodide = null;
    let micropip = null;
    const installed = new Set();

    function append(text, isError) {
        const span = document.createElement("span");
        if (isError) span.className = "stderr";
        span.textContent = text;
        outputEl.appendChild(span);
    }

    function appendMeta(text) {
        const span = document.createElement("span");
        span.className = "meta";
        span.textContent = text;
        outputEl.appendChild(span);
    }

    async function init() {
        pyodide = await loadPyodide();
        pyodide.setStdout({ batched: (s) => append(s + "\n", false) });
        pyodide.setStderr({ batched: (s) => append(s + "\n", true) });
        await pyodide.loadPackage("micropip");
        micropip = pyodide.pyimport("micropip");

        try {
            // Install the kavalai wheel and let micropip resolve the whole
            // dependency tree: native packages (numpy, pydantic-core, …) are
            // pulled from Pyodide's bundled lock, and the pure-Python core deps
            // (loguru, rich, httpx, sqlalchemy, …) are fetched from PyPI.
            // We deliberately do NOT pre-load anything, so micropip is free to
            // pick versions that satisfy kavalai's requirements.
            const wheel = wheelEl.value.trim();
            statusEl.textContent = "Installing kavalai (downloading dependencies)…";
            await micropip.install(wheel);

            statusEl.textContent = "Ready — kavalai installed";
        } catch (err) {
            statusEl.textContent = "kavalai install failed (see output)";
            append(
                "Could not install kavalai: " + String(err.message || err) + "\n\n" +
                "Tip: serve this folder over HTTP (e.g. `python -m http.server` from the\n" +
                "repo root) and make sure the wheel exists — build it with `uv build --wheel`.\n" +
                "You can still run plain Python below.\n",
                true,
            );
        }
        wheelEl.disabled = true;
        runBtn.disabled = false;
        packagesEl.disabled = false;
    }

    async function installPackages() {
        const names = packagesEl.value.split(",").map(s => s.trim()).filter(Boolean);
        for (const name of names) {
            if (installed.has(name)) continue;
            statusEl.textContent = `Installing ${name}…`;
            await micropip.install(name);
            installed.add(name);
        }
    }

    async function run() {
        if (!pyodide) return;
        runBtn.disabled = true;
        outputEl.innerHTML = "";
        try {
            // Install any packages listed in the input field.
            await installPackages();
            // Auto-load pure-Pyodide packages referenced by imports (numpy, pandas, …).
            statusEl.textContent = "Loading imports…";
            await pyodide.loadPackagesFromImports(editor.getValue());
            statusEl.textContent = "Running…";
            const result = await pyodide.runPythonAsync(editor.getValue());
            if (result !== undefined) {
                appendMeta("=> " + result + "\n");
            }
        } catch (err) {
            append(String(err.message || err), true);
        } finally {
            statusEl.textContent = "Ready";
            runBtn.disabled = false;
        }
    }

    init();
</script>
</body>
</html>
