<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaval.AI Python Playground (Pyodide)</title>
    <!-- Kaval.AI icon mark (matches docs/_static/favicon.svg), inlined to keep
         this page self-contained. -->
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 79.375 79.375'><g transform='translate(-27.011657,-24.494702)'><g transform='matrix(0.26458333,0,0,0.26458333,-506.65292,-7.2552973)'><path d='m 2317,120 h -300 v 300 h 300 z' fill='%23002626'/><path d='m 2145.42,235.72 c -1.16,-1.164 -1.82,-2.752 -1.82,-4.424 V 120 H 2017 v 1.842 L 2138.82,233.9 c 1.29,1.185 2.01,2.857 2.01,4.593 V 420 h 176.15 v -12.679 z' fill='%23acc12f'/></g></g></svg>">
    <script src="https://cdn.jsdelivr.net/pyodide/v314.0.0/full/pyodide.js"></script>
    <!-- CodeMirror for Python syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <!--
      In-browser bridge for Kaval.AI's "browser/..." models (chat + embeddings).

      It exposes two async functions on the global scope:

          window.kavalBrowserLLM.chat(requestJson)  -> Promise<resultJson>
          window.kavalBrowserLLM.embed(requestJson) -> Promise<resultJson>

      - chat (kavalai.llm_clients.browser_client.BrowserLLMClient) takes a JSON
        string {model, messages, temperature, top_p, response_format?} and reads
        back {content, usage} or {error}.
      - embed (kavalai.llm_clients.embeddings.BrowserEmbeddingClient) takes a JSON
        string {model, input} (input = list of texts) and reads back
        {embeddings, usage} or {error}.

      Inference runs locally via WebLLM (WebGPU) — no API key, no provider account,
      no CORS. Models are downloaded and cached by the browser on first use. WebLLM
      is loaded lazily so the page stays light until a call is actually made.
    -->
    <script type="module">
        let webllmModulePromise = null;
        let enginePromise = null;
        let loadedModel = null;

        function loadWebLLM() {
            if (!webllmModulePromise) {
                webllmModulePromise = import("https://esm.run/@mlc-ai/web-llm");
            }
            return webllmModulePromise;
        }

        async function getEngine(modelId) {
            if (!navigator.gpu) {
                throw new Error(
                    "WebGPU is not available in this browser. On Linux, Chrome/Brave " +
                    "need it enabled: set chrome://flags/#enable-unsafe-webgpu and " +
                    "chrome://flags/#enable-vulkan to Enabled, then relaunch (Firefox: " +
                    "about:config dom.webgpu.enabled=true). Verify at chrome://gpu."
                );
            }
            // Reuse the engine while the model is unchanged; rebuild on switch.
            if (enginePromise && loadedModel === modelId) return enginePromise;
            loadedModel = modelId;
            const webllm = await loadWebLLM();
            enginePromise = webllm.CreateMLCEngine(modelId, {
                initProgressCallback: (report) => {
                    if (typeof window.__kavalLLMProgress === "function") {
                        window.__kavalLLMProgress(report);
                    }
                },
            });
            return enginePromise;
        }

        window.kavalBrowserLLM = {
            async chat(requestJson) {
                try {
                    const req = typeof requestJson === "string"
                        ? JSON.parse(requestJson) : requestJson;
                    const engine = await getEngine(req.model);

                    const opts = { messages: req.messages, stream: false };
                    if (req.temperature != null) opts.temperature = req.temperature;
                    if (req.top_p != null) opts.top_p = req.top_p;
                    if (req.max_tokens != null) opts.max_tokens = req.max_tokens;
                    if (req.response_format) {
                        const rf = { type: req.response_format.type || "json_object" };
                        if (req.response_format.schema != null) {
                            // WebLLM expects the JSON schema as a string.
                            rf.schema = typeof req.response_format.schema === "string"
                                ? req.response_format.schema
                                : JSON.stringify(req.response_format.schema);
                        }
                        opts.response_format = rf;
                    }

                    const reply = await engine.chat.completions.create(opts);
                    const choice = reply.choices && reply.choices[0];
                    return JSON.stringify({
                        content: (choice && choice.message && choice.message.content) || "",
                        usage: reply.usage || {},
                    });
                } catch (err) {
                    return JSON.stringify({ error: String((err && err.message) || err) });
                }
            },
            async embed(requestJson) {
                try {
                    const req = typeof requestJson === "string"
                        ? JSON.parse(requestJson) : requestJson;
                    const engine = await getEngine(req.model);

                    const reply = await engine.embeddings.create({
                        input: req.input,
                        model: req.model,
                    });
                    return JSON.stringify({
                        // OpenAI-shaped: one {embedding} object per input text.
                        embeddings: (reply.data || []).map((d) => d.embedding),
                        usage: reply.usage || {},
                    });
                } catch (err) {
                    return JSON.stringify({ error: String((err && err.message) || err) });
                }
            },
        };
    </script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            background: #181825;
            border-bottom: 1px solid #313244;
            flex-wrap: wrap;
        }
        header h1 {
            font-size: 1rem; margin: 0; font-weight: 600;
            display: flex; align-items: center; gap: 0.5rem;
        }
        header h1 .logo { width: 1.4rem; height: 1.4rem; display: block; }
        header .status { font-size: 0.8rem; color: #a6adc8; margin-left: auto; }
        #packages, #wheel, #llmModel, #example {
            background: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid #313244;
            border-radius: 6px;
            padding: 0.4rem 0.6rem;
            font-size: 0.8rem;
            min-width: 240px;
        }
        #wheel { min-width: 320px; }
        #llmModel { min-width: 200px; }
        #example { min-width: 150px; }
        button {
            background: #89b4fa;
            color: #1e1e2e;
            border: none;
            border-radius: 6px;
            padding: 0.4rem 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button:not(:disabled):hover { background: #74c7ec; }
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: #313244;
            min-height: 0;
        }
        .panel { display: flex; flex-direction: column; background: #1e1e2e; min-height: 0; }
        .panel-label {
            padding: 0.4rem 0.75rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a6adc8;
            background: #181825;
        }
        .CodeMirror {
            flex: 1;
            height: auto;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        #output {
            flex: 1;
            margin: 0;
            overflow: auto;
            padding: 0.75rem;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .stderr { color: #f38ba8; }
        .meta { color: #a6adc8; font-style: italic; }
    </style>
</head>
<body>
<header>
    <h1>
        <svg class="logo" viewBox="0 0 79.375 79.375" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <g transform="translate(-27.011657,-24.494702)">
                <g transform="matrix(0.26458333,0,0,0.26458333,-506.65292,-7.2552973)">
                    <path d="m 2317,120 h -300 v 300 h 300 z" fill="#002626"/>
                    <path d="m 2145.42,235.72 c -1.16,-1.164 -1.82,-2.752 -1.82,-4.424 V 120 H 2017 v 1.842 L 2138.82,233.9 c 1.29,1.185 2.01,2.857 2.01,4.593 V 420 h 176.15 v -12.679 z" fill="#acc12f"/>
                </g>
            </g>
        </svg>
        Kaval.AI Playground
    </h1>
    <select id="example" title="Load a ready-made example into the editor">
        <option value="chat">Example: Chat</option>
        <option value="embeddings">Example: Embeddings</option>
    </select>
    <input id="wheel" type="text" value="dist/kavalai-1.0.0-py3-none-any.whl"
           title="URL or relative path to the kavalai wheel (built with: uv build --wheel)">
    <select id="llmModel" title="In-browser LLM model (WebLLM, downloaded on first use). q4f32 builds run on GPUs without FP16 shaders (e.g. GTX 10xx).">
        <option value="Llama-3.2-1B-Instruct-q4f32_1-MLC">Llama-3.2-1B · q4f32 (≈1.1 GB)</option>
        <option value="Llama-3.2-3B-Instruct-q4f32_1-MLC">Llama-3.2-3B · q4f32 (≈2.9 GB)</option>
        <option value="Qwen2.5-1.5B-Instruct-q4f32_1-MLC">Qwen2.5-1.5B · q4f32 (≈1.6 GB)</option>
        <option value="Qwen2.5-0.5B-Instruct-q4f32_1-MLC">Qwen2.5-0.5B · q4f32 (≈0.6 GB)</option>
        <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama-3.2-1B · q4f16 (needs FP16 GPU)</option>
        <option value="Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama-3.2-3B · q4f16 (needs FP16 GPU)</option>
    </select>
    <input id="packages" type="text" placeholder="extra packages (e.g. plotly)" disabled>
    <button id="run" disabled>Run ▶</button>
    <span class="status" id="status">Loading Pyodide…</span>
</header>
<main>
    <section class="panel">
        <div class="panel-label">Code — press Ctrl+Enter to run</div>
        <textarea id="code"></textarea>
    </section>
    <section class="panel">
        <div class="panel-label">Output (stdout / stderr)</div>
        <pre id="output"></pre>
    </section>
</main>

<script>
    const outputEl = document.getElementById("output");
    const runBtn = document.getElementById("run");
    const statusEl = document.getElementById("status");
    const packagesEl = document.getElementById("packages");
    const wheelEl = document.getElementById("wheel");
    const llmModelEl = document.getElementById("llmModel");
    const exampleEl = document.getElementById("example");

    // The WebLLM bridge calls this with model-download / init progress reports.
    window.__kavalLLMProgress = (report) => {
        statusEl.textContent = report && report.text ? report.text : "Loading model…";
    };

    // Ready-made examples; the header "Example" dropdown swaps between them.
    const EXAMPLES = {
        chat:
`# Call an LLM fully in the browser with Kaval.AI — no API key, no server, no CORS.
#
# make_client("browser/<model>") returns a BrowserLLMClient that runs inference
# locally through the page's WebLLM bridge (WebGPU). The first run downloads the
# selected model (watch the status bar) and the browser caches it for next time.
# Needs a WebGPU-capable browser; KAVAL_BROWSER_MODEL comes from the header dropdown.
from kavalai import make_client, ChatHistory, ChatMessage

print(f"Loading {KAVAL_BROWSER_MODEL} in the browser (first run can take a while)…")
client = make_client(f"browser/{KAVAL_BROWSER_MODEL}")

reply = await client.chat_completions(chat_history=ChatHistory(messages=[
    ChatMessage(role="system", content="You are a terse, friendly assistant."),
    ChatMessage(role="user", content="Say hello and tell me one fun fact about Estonia."),
]))

print("\\nLLM says:", reply)
`,
        embeddings:
`# Compute text embeddings fully in the browser with Kaval.AI — no API key, no server.
#
# make_embedding_client("browser/<model>") returns a BrowserEmbeddingClient that
# runs locally through the page's WebLLM bridge (WebGPU). Embedding models are
# separate from chat models — here we use a small Snowflake Arctic model in q0f32
# (full precision, so it runs even on GPUs without FP16 shaders). The first run
# downloads and caches the model; later runs are instant.
from kavalai import make_embedding_client

client = make_embedding_client("browser/snowflake-arctic-embed-s-q0f32-MLC-b4")

texts = [
    "Tallinn is the capital of Estonia.",
    "Estonia's capital city is Tallinn.",
    "I had pasta for dinner last night.",
]
print(f"Embedding {len(texts)} texts in the browser (first run downloads the model)…")

# normalize=True returns L2-normalised vectors, so cosine similarity is just
# their dot product.
vectors, stats = await client.compute_embeddings(texts, normalize=True)
print(f"\\nGot {len(vectors)} vectors, each of dimension {len(vectors[0])}.")

def similarity(a, b):
    return sum(x * y for x, y in zip(a, b))

print(f"sim(0, 1) = {similarity(vectors[0], vectors[1]):.3f}  # same meaning")
print(f"sim(0, 2) = {similarity(vectors[0], vectors[2]):.3f}  # unrelated")
`,
    };

    const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
        mode: "python",
        theme: "dracula",
        lineNumbers: true,
        indentUnit: 4,
        extraKeys: { "Ctrl-Enter": run, "Cmd-Enter": run },
    });
    editor.setValue(EXAMPLES[exampleEl.value] || EXAMPLES.chat);
    // Swap the editor contents when the user picks a different example.
    exampleEl.addEventListener("change", () => {
        editor.setValue(EXAMPLES[exampleEl.value] || EXAMPLES.chat);
    });

    let pyodide = null;
    let micropip = null;
    const installed = new Set();

    function append(text, isError) {
        const span = document.createElement("span");
        if (isError) span.className = "stderr";
        span.textContent = text;
        outputEl.appendChild(span);
    }

    function appendMeta(text) {
        const span = document.createElement("span");
        span.className = "meta";
        span.textContent = text;
        outputEl.appendChild(span);
    }

    async function init() {
        pyodide = await loadPyodide();
        pyodide.setStdout({ batched: (s) => append(s + "\n", false) });
        pyodide.setStderr({ batched: (s) => append(s + "\n", true) });
        await pyodide.loadPackage("micropip");
        micropip = pyodide.pyimport("micropip");

        try {
            // Install the kavalai wheel and let micropip resolve the whole
            // dependency tree: native packages (numpy, pydantic-core, …) are
            // pulled from Pyodide's bundled lock, and the pure-Python core deps
            // (loguru, rich, httpx, sqlalchemy, …) are fetched from PyPI.
            // We deliberately do NOT pre-load anything, so micropip is free to
            // pick versions that satisfy kavalai's requirements.
            const wheel = wheelEl.value.trim();
            statusEl.textContent = "Installing kavalai (downloading dependencies)…";
            await micropip.install(wheel);

            statusEl.textContent = "Ready — kavalai installed";
        } catch (err) {
            statusEl.textContent = "kavalai install failed (see output)";
            append(
                "Could not install kavalai: " + String(err.message || err) + "\n\n" +
                "Tip: serve this folder over HTTP (e.g. `python -m http.server` from the\n" +
                "repo root) and make sure the wheel exists — build it with `uv build --wheel`.\n" +
                "You can still run plain Python below.\n",
                true,
            );
        }
        wheelEl.disabled = true;
        runBtn.disabled = false;
        packagesEl.disabled = false;
    }

    async function installPackages() {
        const names = packagesEl.value.split(",").map(s => s.trim()).filter(Boolean);
        for (const name of names) {
            if (installed.has(name)) continue;
            statusEl.textContent = `Installing ${name}…`;
            await micropip.install(name);
            installed.add(name);
        }
    }

    async function run() {
        if (!pyodide) return;
        runBtn.disabled = true;
        outputEl.innerHTML = "";
        try {
            // Install any packages listed in the input field.
            await installPackages();
            // Expose the chosen in-browser LLM model to Python as a global so the
            // example can build a "browser/<model>" client without hardcoding ids.
            pyodide.globals.set("KAVAL_BROWSER_MODEL", llmModelEl.value);
            // Auto-load pure-Pyodide packages referenced by imports (numpy, pandas, …).
            statusEl.textContent = "Loading imports…";
            await pyodide.loadPackagesFromImports(editor.getValue());
            statusEl.textContent = "Running…";
            const result = await pyodide.runPythonAsync(editor.getValue());
            if (result !== undefined) {
                appendMeta("=> " + result + "\n");
            }
        } catch (err) {
            append(String(err.message || err), true);
        } finally {
            statusEl.textContent = "Ready";
            runBtn.disabled = false;
        }
    }

    init();
</script>
</body>
</html>
