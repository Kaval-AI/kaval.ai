<div class="agents-container">
  <h2>Agents</h2>

  <div *ngIf="loading" class="loading">Loading agents...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && !error">
    <div *ngIf="agents.length === 0" class="no-agents">
      No agents found for this project.
    </div>

    <table *ngIf="agents.length > 0" class="agents-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Description</th>
          <th>Created At</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let agent of agents">
          <td>{{ agent.name }}</td>
          <td>{{ agent.description }}</td>
          <td>{{ agent.created_at | date:'short' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
