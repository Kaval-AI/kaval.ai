<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title><img src="assets/images/kavalai.svg" alt="Kaval.AI" class="login-logo"/></mat-card-title>
      <mat-card-title>Enterprise Artificial Intelligence Agent</mat-card-title>
      <mat-card-subtitle>Please log in to continue</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content> 
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" required placeholder="user@example.com">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password" required>
        </mat-form-field>
        
        @if (errorMessage) {
          <p class="error-message">{{ errorMessage }}</p>
        }

        <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid" class="full-width">
          Log In
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
