<div class="json-node" [style.padding-left.px]="depth > 0 ? 20 : 0">
  <div class="json-line" (click)="toggleExpand($event)" [class.expandable]="isExpandable">
    @if (isExpandable) {
      <span class="toggle-icon">
        {{ isExpanded ? '▼' : '▶' }}
      </span>
    } @else {
      <span class="spacer"></span>
    }

    @if (key !== null) {
      <span class="json-key">{{ key }}: </span>
    }

    <span class="json-value" [ngClass]="'type-' + type">
      {{ formattedValue }}
    </span>

    @if (depth === 0 && isExpandable) {
      <div class="tree-controls">
        <button (click)="copyToClipboard($event)" [title]="isCopied ? 'Copied!' : 'Copy to Clipboard'" class="control-btn" [class.success]="isCopied">
          @if (isCopied) {
            <i class="fas fa-check"></i> Copied
          } @else {
            <i class="fas fa-copy"></i> Copy
          }
        </button>
        <button (click)="expandAll($event)" title="Expand All" class="control-btn">
          <i class="fas fa-expand-arrows-alt"></i> Expand All
        </button>
        <button (click)="collapseAll($event)" title="Collapse All" class="control-btn">
          <i class="fas fa-compress-arrows-alt"></i> Collapse All
        </button>
      </div>
    }
  </div>

  @if (isExpanded && isObject) {
    <div class="json-children">
      @for (child of children; track child.key) {
        <app-json-tree
          [data]="child.value"
          [key]="child.key"
          [depth]="depth + 1"
          [isExpanded]="false"
        ></app-json-tree>
      }
    </div>
  }
</div>
