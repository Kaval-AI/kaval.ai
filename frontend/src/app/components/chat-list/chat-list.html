<div class="chat-list-container" [ngClass]="{'condensed': isCondensed}">
  <!-- Burger Icon to Toggle Sidenav -->
  <button mat-icon-button (click)="toggleCondensed()"
    class="sidenav-toggle-button">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- New Chat Button -->
  <button matButton class="new-chat-button" (click)="onNewChatClicked()">
    <mat-icon>add</mat-icon>
    @if (!isCondensed) {
    <span>New Chat</span>
    }
  </button>

  <!-- Recent Chats Section -->
  @if (!isCondensed) {
  <h3 class="recent-chats-title">Recent chats</h3>
  <ul class="chat-items-list">
    @for (chat of getOrderedChats(); track chat.uuid) {
    <li class="chat-item" (click)="onChatClick(chat.uuid)"
      (mouseenter)="onMouseEnter(chat.uuid)" (mouseleave)="onMouseLeave()"
      [ngClass]="{
        hovered: hoveredChatId === chat.uuid,
        selected: selectedChatId === chat.uuid
      }">
      <span class="chat-title" [ngClass]="{
        hovered: hoveredChatId === chat.uuid,
        selected: selectedChatId === chat.uuid
      }">{{ chat.title }}</span>

      <!-- Context Menu Button (visible on hover) -->
      <button mat-icon-button [matMenuTriggerFor]="chatMenu"
        (click)="$event.stopPropagation()" class="context-menu-button"
        [ngClass]="{'visible': hoveredChatId === chat.uuid}">
        <mat-icon>more_vert</mat-icon>
      </button>

      <!-- The chat menu -->
      <mat-menu #chatMenu="matMenu">
        <button mat-menu-item (click)="onRenameChat(chat.uuid)">
          <mat-icon>edit</mat-icon>
          <span>Rename</span>
        </button>
        <button mat-menu-item (click)="onDeleteChat(chat.uuid)">
          <mat-icon>delete</mat-icon>
          <span>Delete</span>
        </button>
      </mat-menu>
    </li>
    }
  </ul>
  <h3 class="recent-chats-title">Integrations</h3>
  <button matButton class="new-integration-button">
    <mat-icon>email</mat-icon><span>Email</span>
  </button>
  <button matButton class="new-integration-button">
    <mat-icon>calendar_today</mat-icon><span>Calendar</span>
  </button>

  <h3 class="recent-chats-title">RAG</h3>

  <h3 class="recent-chats-title">Agent programming</h3>
}
</div>
