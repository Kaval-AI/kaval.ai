<div class="centered">
  <main>
    <h2>{{ projectId && projectId !== 'new' ? 'Edit Project' : 'New Project' }}</h2>
    <form [formGroup]="projectForm" (ngSubmit)="saveProject()" class="form-container">
      <div class="form-field">
        <label for="name">Project Name</label>
        <input id="name" type="text" formControlName="name" placeholder="Enter project name">
      </div>

      <div class="form-field">
        <label for="desc">Description</label>
        <textarea id="desc" formControlName="description" rows="2"></textarea>
      </div>

      <fieldset class="db-settings">
        <legend>Database Connection</legend>

        <div class="form-row">
          <div class="form-field">
            <label for="db_host">Host</label>
            <input id="db_host" type="text" formControlName="db_host" placeholder="localhost">
          </div>
          <div class="form-field port-field">
            <label for="db_port">Port</label>
            <input id="db_port" type="number" formControlName="db_port">
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="db_name">Database Name</label>
            <input id="db_name" type="text" formControlName="db_name">
          </div>
          <div class="form-field">
            <label for="db_schema">Schema</label>
            <input id="db_schema" type="text" formControlName="db_schema">
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="db_user">Username</label>
            <input id="db_user" type="text" formControlName="db_user">
          </div>
          <div class="form-field">
            <label for="db_password">Password</label>
            <input id="db_password" type="password" formControlName="db_password">
          </div>
        </div>

        @if (projectId && projectId !== 'new') {
          <div class="test-connection-row">
            <button type="button"
                    (click)="testConnection()"
                    [disabled]="isTestingConnection">
              {{ isTestingConnection ? 'Testing...' : 'Test Connection' }}
            </button>
            @if (connectionStatus) {
              <span class="status-msg" [class.success]="connectionStatus.status === 'success'" [class.error]="connectionStatus.status === 'error'">
                {{ connectionStatus.message }}
              </span>
            }
          </div>
        }
      </fieldset>

      <div class="button-row">
        <button type="submit" [disabled]="projectForm.invalid">Save</button>
        <button type="button" (click)="cancel()">Cancel</button>
      </div>
    </form>
  </main>
</div>
