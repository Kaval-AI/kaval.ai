<div class="run-tasks-container">
  <div class="header">
    <button class="back-button" (click)="goBack()">
      <span class="icon">←</span> Back to Agent Run
    </button>

    @if (sessionId && runId) {
      <div class="info">
        <span class="label">Session:</span>
        <span class="value">{{ sessionId }}</span>
        <span class="sep">|</span>
        <span class="label">Run:</span>
        <span class="value">{{ runId }}</span>
      </div>
    }
  </div>

  <div class="content">
    @if (loading) {
      <div class="loading-state">Loading tasks...</div>
    } @else if (error) {
      <div class="error-state">{{ error }}</div>
    } @else if (tasks.length === 0) {
      <div class="empty-state">No tasks found for this run.</div>
    } @else {
      <app-tasks-list
        [tasks]="tasks"
        [runId]="runId || ''"
        (backToRun)="goBack()"></app-tasks-list>
    }
  </div>
</div>
