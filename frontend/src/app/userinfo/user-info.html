<div class="user-info-container">
  <button matButton [matMenuTriggerFor]="menu" class="user-details">{{ userDetails?.name }}
    <img
      [src]="userDetails?.picture"
      alt="User Image"
      class="user-avatar"/>
    </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item (click)="logout()">Logout</button>
  </mat-menu>
</div>
