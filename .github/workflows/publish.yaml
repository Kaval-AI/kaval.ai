name: Publish to GitHub Packages

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to GitHub Packages
        run: |
          pip install twine
          export TWINE_USERNAME=${{ github.actor }}
          export TWINE_PASSWORD=${{ secrets.GITHUB_TOKEN }}
          export TWINE_REPOSITORY_URL=https://maven.pkg.github.com/${{ github.repository_owner }}/kaval.ai
          twine upload dist/*
