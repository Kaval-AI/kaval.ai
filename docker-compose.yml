services:
  postgres_db:
    image: pgvector/pgvector:pg15-trixie
    restart: no
    environment:
      POSTGRES_USER: kavalai_dev
      POSTGRES_PASSWORD: kavalai_dev
      POSTGRES_DB: kavalai_dev
      PGDATA: /var/lib/postgresql/pgdata
    ports:
      - "6543:5432"
    volumes:
      - ./local_data/pgdata:/var/lib/postgresql/pgdata
    networks:
      - kavalai

  backoffice-migrations:
    build:
      context: .
      dockerfile: dockerfiles/backoffice.Dockerfile
    command: backoffice-migrations
    env_file: .env
    environment:
      - KAVALAI_BO_DB_URI=postgresql://kavalai_dev:kavalai_dev@postgres_db:5432/kavalai_dev
      - KAVALAI_BO_DB_SCHEMA=backoffice
    depends_on:
      - postgres_db
    networks:
      - kavalai

  backoffice:
    build:
      context: .
      dockerfile: dockerfiles/backoffice.Dockerfile
    command: backoffice-server
    ports:
      - "8000:80"
    env_file: .env
    environment:
      - KAVALAI_BO_DB_URI=postgresql://kavalai_dev:kavalai_dev@postgres_db:5432/kavalai_dev
      - KAVALAI_BO_DB_SCHEMA=backoffice
      - FRONTEND_URL=http://localhost:8000
    depends_on:
      - backoffice-migrations
    networks:
      - kavalai

  agent-migrations:
    build:
      context: .
      dockerfile: dockerfiles/agent.Dockerfile
    command: agent-migrations
    env_file: .env
    environment:
      - KAVALAI_DB_URI=postgresql://kavalai_dev:kavalai_dev@postgres_db:5432/kavalai_dev
      - KAVALAI_DB_SCHEMA=agents
    depends_on:
      - postgres_db
    networks:
      - kavalai


  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./local_data/ollama:/root/.ollama
    networks:
      - kavalai


  torproxy:
    image: dperson/torproxy
    restart: always
    ports:
      - "8118:8118"
      - "9050:9050"
    environment:
      - TZ=UTC
    networks:
      - kavalai

networks:
  kavalai:
    driver: bridge
