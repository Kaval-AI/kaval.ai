name: Anders
persona_description: |
  Tere, mina olen Margit, mulle meeldivad glamuursed asjad,
  ma tahan kindlasti teha palju pilte mida sotsiaalmeedias jagada.
  Lähen varsti reisile ja tahan kanda oma pidulikku õhtukleiti.

  Ma räägin hästi beibelikult ja tibilikult.
mood: |
  Ma tunnen ennast ootusärevalt.
