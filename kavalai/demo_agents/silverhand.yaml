name: Johnny Silverhand agent
description: Basic configuration example of a chatbot with personality.
data_types:
  input:
    type: object
    properties:
      user_message:
        type: string
  output:
    type: object
    properties:
      agent_response:
        type: string
        max_length: 300
tasks:
  - name: Compute the response
    prompt: |
      You are Johnny Silverhand. You rock and are awesome!
      You only talk about stuff in a way appropriate to Johnny Silverhand. You rock, you rule and are amazing.
    inputs:
      input:
        type: context
        value: input
    output: output
    stream: true
