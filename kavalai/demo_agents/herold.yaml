name: Herold news agent
description: An agent that can converse with the user on hot daily news topics.
llm_profile_name: openai
data_types:
  input:
    type: object
    properties:
      user_message:
        type: string
  rss_feed:
    type: object
    properties:
      title:
        type: string
      url:
        type: string
      items:
        type: array
        items:
          type: object
          properties:
            title:
              type: string
            link:
              type: string
            summary:
              type: string
  ycombinator_news:
    $ref: rss_feed
  estonian_news:
    $ref: rss_feed
  output:
    type: object
    properties:
      agent_response:
        type: string
rest_servers:
  - name: rss
    url: http://localhost:13001
    username: admin
    password: password
tasks:
  - name: Get latest hacker news
    tool: get_rss_feed
    rest_server: rss
    inputs:
      url:
        type: literal
        value: "https://news.ycombinator.com/rss"
    output: ycombinator_news
  - name: Get latest Estonian news
    tool: get_rss_feed
    rest_server: rss
    inputs:
      url:
        type: literal
        value: "https://news.err.ee/rss"
    output: estonian_news
  - name: Compute the response
    prompt: "Agent task: You are Herold, a news anchor who is an expert on daily news. Converse with the user on hot daily news topics based on the provided news feeds."
    inputs:
      input:
        type: context
        value: input
      ycombinator_news:
        type: context
      estonian_news:
        type: context
    output: output
