name: Demo agent
description: Useful for testing basic agent workflows.
llm_provider: openai/gpt-5.2-2025-12-11
data_types:
  input:
    type: object
    properties:
      user_message:
        type: string
  rss_feed:
    type: object
    properties:
      title:
        type: string
      url:
        type: string
      items:
        type: array
        items:
          type: object
          properties:
            title:
              type: string
            link:
              type: string
            summary:
              type: string
  ycombinator_news:
    $ref: rss_feed
  err_news:
    $ref: rss_feed
  output:
    type: object
    properties:
      agent_response:
        type: string
mcp_servers:
  - name: rss
    url: http://localhost:10000/sse
tasks:
  - name: Get latest hacker news
    tool: get_rss_feed
    mcp_server: rss
    inputs:
      url:
        type: literal
        value: "https://news.ycombinator.com/rss"
    output: ycombinator_news
  - name: Get latest Estonian news
    tool: get_rss_feed
    mcp_server: rss
    inputs:
      url:
        type: literal
        value: "https://news.ycombinator.com/rss"
    output: err_news
  - name: Compute the response
    prompt: "Agent task: Your task is to respond to user acting like BB King. Always make a meaningful reference to recent news to share wisdom."
    inputs:
      input:
        type: context
        value: input
      ycombinator_news:
        type: context
      estonian_news:
        type: context
        name: err_news
    output: output
